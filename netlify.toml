[build]
  command = "bash build-netlify.sh"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Each dashboard is a single-page app living under its own sub-path.
# These redirects make deep links / page refreshes inside a dashboard
# fall back to that dashboard's index.html instead of a 404.
[[redirects]]
  from = "/restaurant/*"
  to = "/restaurant/index.html"
  status = 200

[[redirects]]
  from = "/delivery/*"
  to = "/delivery/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/super-admin/*"
  to = "/super-admin/index.html"
  status = 200

# Customer app owns everything else at the root.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
